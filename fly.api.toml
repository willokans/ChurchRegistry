# Fly.io config for the dedicated Spring Boot API app.
# Create app once (or let CI create it): fly apps create church-registry-api-staging

app = "church-registry-api-staging"
primary_region = "sin"

[vm]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

[env]
  PORT = "8080"
  SPRING_PROFILES_ACTIVE = "prod"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 50
    soft_limit = 40

  [[http_service.checks]]
    grace_period = "300s"
    interval = "15s"
    method = "GET"
    path = "/api/health"
    timeout = "5s"
