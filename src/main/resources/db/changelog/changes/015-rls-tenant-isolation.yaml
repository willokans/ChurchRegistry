# RLS policies for tenant (parish) isolation - defense-in-depth.
# Requires Spring to set app.parish_ids (comma-separated) and app.is_admin ('true'/'false') per request.
# Only applies when connecting with a role that respects RLS (not superuser). Use FORCE ROW LEVEL SECURITY
# so table owner is also subject to policies when using a non-bypass role.
databaseChangeLog:
  - changeSet:
      id: 40
      author: will_okanumeh
      comment: Add RLS helper function and enable RLS on tenant-scoped tables
      preConditions:
        - onFail: MARK_RAN
        - dbms:
            type: postgresql
      changes:
        - sql:
            sql: |
              -- Helper: parse app.parish_ids session variable to bigint array (empty array if unset/empty)
              CREATE OR REPLACE FUNCTION app_rls_parish_ids() RETURNS bigint[] AS $$
              SELECT COALESCE(
                (SELECT ARRAY_AGG(x::bigint)
                 FROM unnest(string_to_array(NULLIF(trim(current_setting('app.parish_ids', true)), ''), ',')) AS t(x)
                 WHERE x ~ '^[0-9]+$' AND x <> ''),
                '{}'::bigint[]
              );
              $$ LANGUAGE sql STABLE;

              CREATE OR REPLACE FUNCTION app_rls_is_admin() RETURNS boolean AS $$
              SELECT current_setting('app.is_admin', true) = 'true';
              $$ LANGUAGE sql STABLE;
            splitStatements: false

        - sql:
            sql: |
              ALTER TABLE baptism ENABLE ROW LEVEL SECURITY;
              ALTER TABLE baptism FORCE ROW LEVEL SECURITY;
            splitStatements: true

        - sql:
            sql: |
              DROP POLICY IF EXISTS "baptism_tenant_isolation" ON baptism;
              CREATE POLICY "baptism_tenant_isolation" ON baptism
                FOR ALL
                USING (
                  app_rls_is_admin()
                  OR (parish_id IS NOT NULL AND parish_id = ANY(app_rls_parish_ids()))
                )
                WITH CHECK (
                  app_rls_is_admin()
                  OR (parish_id IS NOT NULL AND parish_id = ANY(app_rls_parish_ids()))
                );
            splitStatements: true

        - sql:
            sql: |
              ALTER TABLE first_holy_communion ENABLE ROW LEVEL SECURITY;
              ALTER TABLE first_holy_communion FORCE ROW LEVEL SECURITY;
            splitStatements: true

        - sql:
            sql: |
              DROP POLICY IF EXISTS "communion_tenant_isolation" ON first_holy_communion;
              CREATE POLICY "communion_tenant_isolation" ON first_holy_communion
                FOR ALL
                USING (
                  app_rls_is_admin()
                  OR EXISTS (
                    SELECT 1 FROM baptism b
                    WHERE b.id = first_holy_communion.baptism_id
                      AND b.parish_id = ANY(app_rls_parish_ids())
                  )
                )
                WITH CHECK (
                  app_rls_is_admin()
                  OR EXISTS (
                    SELECT 1 FROM baptism b
                    WHERE b.id = first_holy_communion.baptism_id
                      AND b.parish_id = ANY(app_rls_parish_ids())
                  )
                );
            splitStatements: true

