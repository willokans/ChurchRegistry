databaseChangeLog:
  - changeSet:
      id: 1
      author: will_okanumeh
      changes:
        - addColumn:
            tableName: baptism
            columns:
              - column:
                  name: place_of_birth
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: place_of_baptism
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: date_of_baptism
                  type: date
                  constraints:
                    nullable: true
              - column:
                  name: liber_no
                  type: varchar(50)
                  constraints:
                    nullable: true
