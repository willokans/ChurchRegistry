# Certificate upload (Holy Communion, Baptism from another parish) requires:
# SUPABASE_SERVICE_ROLE_KEY — from Supabase Dashboard → Project Settings → API
# (SUPABASE_URL or NEXT_PUBLIC_SUPABASE_URL optional; inferred from datasource username if postgres.xxx)
spring:
  datasource:
    # prepareThreshold=0 and preferQueryMode=simple avoid "prepared statement already exists" with Supabase pooler (PgBouncer)
    url: jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require&preferQueryMode=simple&prepareThreshold=0
    username: postgres.rxaepykghapdwgonvlvi
    password: ${LOCAL_PG_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml

app:
  rls:
    enabled: true  # Enable RLS session vars for tenant isolation (Postgres only)
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:change-me-in-local-postgres}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
