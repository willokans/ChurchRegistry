server:
  address: 0.0.0.0  # Required for Fly.io: listen on all interfaces
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain

# Disable Swagger UI and API docs in production (security: avoid exposing API structure)
springdoc:
  swagger-ui:
    enabled: false
  api-docs:
    enabled: false

spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10   # Tuned for Fly.io 1GB VM
      minimum-idle: 2
      data-source-properties:
        preferQueryMode: simple
        prepareThreshold: 0
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  rls:
    enabled: true  # RLS session vars for tenant isolation (Postgres)
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
