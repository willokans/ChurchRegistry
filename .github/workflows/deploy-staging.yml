name: Deploy to Staging

on:
  push:
    branches: [staging]
    paths:
      - "src/**"
      - "pom.xml"
      - "Dockerfile"
      - "fly.api.toml"
      - "frontend/**"
      - ".github/workflows/deploy-staging.yml"
  workflow_dispatch:

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: mvn -B test

      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Ensure Fly API app exists
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_API_APP_NAME: ${{ vars.FLY_API_APP_NAME }}
          FLY_ORG: ${{ vars.FLY_ORG }}
        run: |
          set -euo pipefail
          APP_NAME="${FLY_API_APP_NAME:-church-registry-api-staging}"
          if ! flyctl apps show "$APP_NAME" >/dev/null 2>&1; then
            if [ -n "${FLY_ORG:-}" ]; then
              flyctl apps create "$APP_NAME" --org "$FLY_ORG"
            else
              flyctl apps create "$APP_NAME"
            fi
          fi

      - name: Sync API secrets
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_API_APP_NAME: ${{ vars.FLY_API_APP_NAME }}
          API_DATABASE_URL: ${{ secrets.API_DATABASE_URL }}
          API_DATABASE_USERNAME: ${{ secrets.API_DATABASE_USERNAME }}
          API_DATABASE_PASSWORD: ${{ secrets.API_DATABASE_PASSWORD }}
          API_JWT_SECRET: ${{ secrets.API_JWT_SECRET }}
          API_CORS_ALLOWED_ORIGINS: ${{ secrets.API_CORS_ALLOWED_ORIGINS }}
          API_JWT_EXPIRATION_MS: ${{ secrets.API_JWT_EXPIRATION_MS }}
          API_JWT_REFRESH_EXPIRATION_MS: ${{ secrets.API_JWT_REFRESH_EXPIRATION_MS }}
        run: |
          set -euo pipefail
          APP_NAME="${FLY_API_APP_NAME:-church-registry-api-staging}"

          required=(API_DATABASE_URL API_DATABASE_USERNAME API_DATABASE_PASSWORD API_JWT_SECRET API_CORS_ALLOWED_ORIGINS)
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required GitHub secret: $key"
              exit 1
            fi
          done

          # Validate JDBC URL format
          if ! echo "$API_DATABASE_URL" | grep -qE '^jdbc:postgresql://[^/]+:[0-9]+/'; then
            echo "ERROR: API_DATABASE_URL must be a full JDBC URL, e.g.:"
            echo "  jdbc:postgresql://aws-1-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require&preferQueryMode=simple&prepareThreshold=0"
            exit 1
          fi

          # Use secrets import (stdin) to preserve & and other special chars in URL
          {
            printf 'SPRING_DATASOURCE_URL=%s\n' "$(printf '%s' "$API_DATABASE_URL" | tr -d '\n')"
            printf 'SPRING_DATASOURCE_USERNAME=%s\n' "$API_DATABASE_USERNAME"
            printf 'SPRING_DATASOURCE_PASSWORD=%s\n' "$API_DATABASE_PASSWORD"
            printf 'JWT_SECRET=%s\n' "$API_JWT_SECRET"
            printf 'CORS_ALLOWED_ORIGINS=%s\n' "$API_CORS_ALLOWED_ORIGINS"
            printf 'JWT_EXPIRATION_MS=%s\n' "${API_JWT_EXPIRATION_MS:-3600000}"
            printf 'JWT_REFRESH_EXPIRATION_MS=%s\n' "${API_JWT_REFRESH_EXPIRATION_MS:-604800000}"
          } | flyctl secrets import --stage --app "$APP_NAME"

      - name: Deploy API to Fly staging
        id: deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_API_APP_NAME: ${{ vars.FLY_API_APP_NAME }}
        run: |
          set -euo pipefail
          APP_NAME="${FLY_API_APP_NAME:-church-registry-api-staging}"
          flyctl deploy -c fly.api.toml --remote-only --app "$APP_NAME"

      - name: Show Fly logs on deploy failure
        if: failure()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_API_APP_NAME: ${{ vars.FLY_API_APP_NAME }}
        run: |
          APP_NAME="${FLY_API_APP_NAME:-church-registry-api-staging}"
          echo "=== Fly API logs (last 150 lines) - check for startup errors ==="
          flyctl logs -a "$APP_NAME" 2>&1 | tail -150

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Test
        working-directory: frontend
        run: npm test
        env:
          CI: true

      - name: Install Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Sync frontend runtime env
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_FRONTEND_APP_NAME: ${{ vars.FLY_FRONTEND_APP_NAME }}
          FLY_API_APP_NAME: ${{ vars.FLY_API_APP_NAME }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          set -euo pipefail
          FRONTEND_APP="${FLY_FRONTEND_APP_NAME:-church-registry-staging}"
          API_APP="${FLY_API_APP_NAME:-church-registry-api-staging}"
          FRONTEND_API_URL="${NEXT_PUBLIC_API_URL:-https://${API_APP}.fly.dev}"

          flyctl secrets set \
            NEXT_PUBLIC_API_URL="$FRONTEND_API_URL" \
            --stage \
            --app "$FRONTEND_APP"

      - name: Deploy to Fly staging
        working-directory: frontend
        run: flyctl deploy --remote-only --app "${FLY_FRONTEND_APP_NAME:-church-registry-staging}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_FRONTEND_APP_NAME: ${{ vars.FLY_FRONTEND_APP_NAME }}
